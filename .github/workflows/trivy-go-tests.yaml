name: Trivy Scan and Go Tests

on:
  workflow_call:
    inputs:
      run_go_tests:
        description: 'Enable Go module download and tests (set to true for Go repos)'
        required: false
        default: false
        type: boolean
      working_directory:
        description: 'Working directory for Go commands (default: root)'
        required: false
        default: '.'
        type: string
      test_path:
        description: 'Path to test directory relative to working_directory (default: ./tests/...)'
        required: false
        default: './tests/...'
        type: string
    secrets:
      GH_ACCESS_TOKEN:
        description: 'GitHub access token for private repo access (required only if run_go_tests is true)'
        required: false
  pull_request:
    branches:
      - dev
      - stage
      - main

permissions:
  contents: read

jobs:
  trivy-scan-and-test:
    name: Run Trivy Scan and Go Tests
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Go environment for private repo access
        if: ${{ inputs.run_go_tests }}
        run: |
          git config --global url."https://${{ secrets.GH_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/wanaware/*
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Download Go Modules
        if: ${{ inputs.run_go_tests }}
        working-directory: ${{ inputs.working_directory }}
        run: go mod download

      - name: Run Go Mod Tidy
        if: ${{ inputs.run_go_tests }}
        working-directory: ${{ inputs.working_directory }}
        run: go mod tidy

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '1'

      - name: Run Go Unit Tests
        if: ${{ inputs.run_go_tests }}
        working-directory: ${{ inputs.working_directory }}
        run: go test -v ${{ inputs.test_path }}
